apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: mooomoocat-rag
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/part-of: mooomoocat-rag-deps
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qdrant
        app.kubernetes.io/part-of: mooomoocat-rag-deps
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.18.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6333
            - name: grpc
              containerPort: 6334
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 6333
            initialDelaySeconds: 30
            periodSeconds: 15
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
